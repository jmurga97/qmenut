name = "qmenut-tenant-config"
main = "src/index.ts"
compatibility_date = "2026-06-16"

# Must match the id in apps/web/wrangler.jsonc — local KV state is keyed by namespace id, so a
# shared --persist-to dir only works when both workers bind the same id.
[[kv_namespaces]]
binding = "TENANT_THEME"
id = "0f5d31e6c4a94b0f8a2d7c1b3e9f6a01"

[vars]
# POC only — move to a secret (`wrangler secret put ADMIN_TOKEN`) before any real deploy.
ADMIN_TOKEN = "dev-token"
